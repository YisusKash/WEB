<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url=index.html">
    <title>Mensaje Enviado | Incolpartes</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        .success-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            text-align: center;
            padding: 20px;
        }
        .success-card {
            background: var(--bg-soft);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid var(--primary-soft);
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .success-icon {
            font-size: 60px;
            color: #25D366;
            margin-bottom: 20px;
        }
        .success-card h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        .success-card p {
            color: var(--muted);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>¡Mensaje Enviado!</h1>
            <p>Gracias por contactar con Incolpartes. Hemos recibido tu solicitud correctamente y nos pondremos en contacto contigo muy pronto.</p>
            <a href="index.html" class="btn-primary">Volver al Inicio ahora</a>
            <p style="margin-top: 20px; font-size: 12px; color: #555;">Serás redirigido automáticamente en unos segundos...</p>
        </div>
    </div>
</body>
</html>
